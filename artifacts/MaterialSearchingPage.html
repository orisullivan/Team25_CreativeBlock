<!DOCTYPE html>
<html class = "MaterialHTML">
    <head>
        <title> The Creative Block </title>
        <link rel = "stylesheet" href = "CSSFormatting.css">
        <link rel = "stylesheet" href = "CSSFormattingMaterialSearching.css">
    </head>
    <header>
        <ul class = "topnav">
        <img src = "Logo.PNG" id = "Logo"></img>
        <div id = "TitleAndSloganBox">
            <h1 id = "Title"> The Creative Block </h1>
            <h2 id = "Slogan"> Placeholder for a Slogan</h2>
        </div>
        <ul class = "PageLinks">
            <li> <a href = "ForumPage.html" id = "GoToForum">Forum</a></li>
            <li><a href = "PatternSearchingPage.html" id = "GoToPatternSearch">Pattern Search</a></li>
            <li> <a href = "MaterialSearchingPage.html" id = "GoToMaterialSearch">Material Search</a></li>
        </ul>
        <li> <a href = "UserPage.html">
            <div id = "ProfileBox">
                <img src = "guest pfp.webp" id = "pfp">
                <p id = "Username"> Guest</p>
            </div>
        </a></li>
    </ul>
    </header>
    <body class = "MaterialBody">
        <div id = "Page">
        <ul class = "PageLayout">
            <div class = "TitleAndSearch">
                <div class="PageTitle"><h1><b>Find a Material!</b></h1></div>
            <div class="search-container">
                <input type="text" placeholder="Search...">
                <i class="fa fa-search"></i>
            </div>
            <div class="Search">
                <form action="">
                <h2>Narrow Your Search Here!</h2>
                <div class="input-box">
                    <label><b>Type of Material:</b></label><br>
                        <input type="checkbox" id="material1" name="material1" value="Yarn">
                        <label for="material1">Yarn</label><br>
                        <input type="checkbox" id="material2" name="material2" value="Thread">
                        <label for="material2">Thread</label><br>
                        <input type="checkbox" id="material3" name="material3" value="Fabric">
                        <label for="material3">Fabric</label><br>
                        <input type="checkbox" id="material4" name="material4" value="Other Material">
                        <label for="material4">Other</label><br>
                </div>
                <div class="input-box">
                    <label><b>Brand:</b></label><br>
                    <input type="checkbox" id="brand1" name="brand1" value="Lion Brand">
                    <label for="brand1">Lion Brand</label><br>
                    <input type="checkbox" id="brand2" name="brand2" value="Bernat">
                    <label for="brand2">Bernat</label><br>
                    <input type="checkbox" id="brand3" name="brand3" value="Red Heart">
                    <label for="brand3">Red Heart</label><br>
                    <input type="checkbox" id="brand4" name="brand4" value="Other Brand">
                    <label for="brand4">Other</label><br>
                </div>
                <div class="input-box">
                    <label><b>Color:</b></label><br>
                    <input type="checkbox" id="color1" name="color1" value="Red">
                    <label for="color1">Red</label><br>
                    <input type="checkbox" id="color2" name="color2" value="Orange">
                    <label for="color2">Orange</label><br>
                    <input type="checkbox" id="color3" name="color3" value="Yellow">
                    <label for="color3">Yellow</label><br>
                    <input type="checkbox" id="color4" name="color4" value="Green">
                    <label for="color4">Green</label><br>
                    <input type="checkbox" id="color5" name="color5" value="Blue">
                    <label for="color5">Blue</label><br>
                    <input type="checkbox" id="color6" name="color6" value="Purple">
                    <label for="color6">Purple</label><br>
                    <input type="checkbox" id="color7" name="color7" value="Black">
                    <label for="color7">Black</label><br>
                    <input type="checkbox" id="color8" name="color8" value="White">
                    <label for="color8">White</label><br>
                    <input type="checkbox" id="color9" name="color9" value="Other Color">
                    <label for="color9">Other</label><br><br>
                </div>
                <button type="submit" class="btn">Submit</button>
            </form>
        </div>
    </div>
        </ul>
        <div class = "AdSpace">
            <h2 id = "AdTitle"> Advertisements </h2>
            <img src = "ad1.png" id = "ad1">
            <img src = "ad2.png" id = "ad2">
            <img src = "ad3.png" id = "ad3">
            <img src = "ad4.png" id = "ad4">
            <img src = "ad5.png" id = "ad5">
        </div>
        </div>
    </body>
</html>

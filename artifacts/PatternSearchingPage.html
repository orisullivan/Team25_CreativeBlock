<!DOCTYPE html>
<html class = "PatternHTML">
    <head>
        <title> The Creative Block </title>
        <link rel = "stylesheet" href = "CSSFormatting.css">
        <link rel = "stylesheet" href = "CSSFormattingPatternSearching.css">
    </head>
    <header>
        <ul class = "topnav">
        <img src = "Logo.PNG" id = "Logo">
        <div id = "TitleAndSloganBox">
            <h1 id = "Title"> The Creative Block </h1>
            <h2 id = "Slogan"> Placeholder for a Slogan</h2>
        </div>
        <ul class = "PageLinks">
            <li> <a href = "ForumPage.html" id = "GoToForum">Forum</a></li>
            <li><a href = "PatternSearchingPage.html" id = "GoToPatternSearch">Pattern Search</a></li>
            <li> <a href = "MaterialSearchingPage.html" id = "GoToMaterialSearch">Material Search</a></li>
        </ul>
        <li> <a href = "UserPage.html">
            <div id = "ProfileBox">
                <img src = "guest pfp.webp" id = "pfp">
                <p id = "Username"> Guest</p>
            </div>
        </a></li>
    </ul>
    </header>
    <body class = "PatternBody">
        <div id = "Page">
        <ul class = "PageLayout">
            <div class = "TitleAndSearch">
        <div class="PageTitle"><h1><b>Find a Pattern!</b></h1></div>
        <div class="search-container">
        <input type="text" placeholder="Search...">
        <i class="fa fa-search"></i>
        </div>

        <div class="Search">
            <form action="">
            <h2>Narrow Your Search Here!</h2>
            <div class="input-box">
                <label><b>Difficulty:</b></label><br>
                <input type="checkbox" id="difficulty1" name="difficulty1" value="Beginner">
                <label for="difficulty1">Beginner</label><br>
                <input type="checkbox" id="difficulty2" name="difficulty2" value="Intermediate">
                <label for="difficulty2">Intermediate</label><br>
                <input type="checkbox" id="difficulty3" name="difficulty3" value="Advanced">
                <label for="difficulty3">Advanced</label><br>
            </div>
            <div class="input-box">
                <label><b>Type of Craft:</b></label><br>
                <input type="checkbox" id="craft1" name="craft1" value="Crochet">
                <label for="craft1">Crochet</label><br>
                <input type="checkbox" id="craft2" name="craft2" value="Knitting">
                <label for="craft2">Knitting</label><br>
                <input type="checkbox" id="craft3" name="craft3" value="Cross Stitch">
                <label for="craft3">Cross Stitch</label><br>
                <input type="checkbox" id="craft4" name="craft4" value="Other Craft">
                <label for="craft4">Other</label><br>
            </div>
            <div class="input-box">
                <label><b>Type of Pattern:</b></label><br>
                <input type="checkbox" id="pattern1" name="pattern1" value="Clothing">
                <label for="pattern1">Clothing</label><br>
                <input type="checkbox" id="pattern2" name="pattern2" value="Homeware">
                <label for="pattern2">Homeware</label><br>
                <input type="checkbox" id="pattern3" name="pattern3" value="Toys">
                <label for="pattern3">Toys</label><br>
                <input type="checkbox" id="pattern4" name="pattern4" value="Other Pattern">
                <label for="pattern4">Other</label><br><br>
            </div>
            <button type="submit" class="btn">Submit</button>
        </form>
        </div>
    </div>
        </ul>
        <div class = "AdSpace">
            <h2 id = "AdTitle"> Advertisements </h2>
            <img src = "ad1.png" id = "ad1">
            <img src = "ad2.png" id = "ad2">
            <img src = "ad3.png" id = "ad3">
            <img src = "ad4.png" id = "ad4">
            <img src = "ad5.png" id = "ad5">
        </div>
        </div>
    </body>
    
</html>
